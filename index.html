<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bold;
            font-size: 25px;
        }

        #mybtn {
            color: white;
            border: none;
            padding: 6px;
            border-radius: 10px;
            font-weight: 500;
            background-color: rgb(0, 147, 238);
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: calc(100vh - 20px);
            text-align: center;
            background-color: rgb(173, 235, 255);
            box-shadow: 1px 1px 10px black;
        }

        .section {
            padding: 10px;
            margin: 30px 0px;
            border-radius: 20px;
        }

        .island {
            box-shadow: 1px 1px 10px black;
            background-color: rgba(109, 194, 255, 0.766);
            padding: 50px;
            border-radius: 40px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="island">
            <div class="section">
                Enter String : <input id="myInput">
                <button id="myBtn">Submit</button>
            </div>
            <div class="section">
                <label>Compressed string: </label>
                <span id="myAnswer"></span>
            </div>
        </div>
    </div>
    <!-- <script src="script1.js"></script> -->
    <script src="script2.js"></script>
</body>

</html>
